<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipes</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f7f5f2; --surface: #fff; --border: #e8e4df; --border-strong: #d4cec7;
      --text: #1a1714; --text2: #6b6560; --text3: #a09b95;
      --accent: #2d6a4f; --accent-light: #e8f4ee; --accent-hover: #1f4f3a;
      --danger: #c0392b; --danger-light: #fdf0ef;
      --tag-bg: #f0ede9; --tag-text: #4a4540;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06);
      --shadow-hover: 0 4px 6px rgba(0,0,0,0.07), 0 12px 32px rgba(0,0,0,0.1);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased}
    .btn{border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;border-radius:8px;transition:all .15s;display:inline-flex;align-items:center;gap:6px;font-size:14px}
    .btn-primary{background:var(--accent);color:#fff;padding:10px 20px}
    .btn-primary:hover{background:var(--accent-hover)}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed}
    .btn-ghost{background:transparent;color:var(--text2);border:1.5px solid var(--border-strong);padding:8px 16px}
    .btn-ghost:hover{background:var(--tag-bg);color:var(--text)}
    .btn-danger{background:transparent;color:var(--danger);border:1.5px solid #e8c5c2;padding:8px 16px}
    .btn-danger:hover{background:var(--danger-light)}
    .btn-sm{padding:6px 14px;font-size:13px}
    input,textarea,select{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;background:var(--surface);color:var(--text);outline:none;transition:border .15s;box-sizing:border-box}
    input:focus,textarea:focus,select:focus{border-color:var(--accent)}
    textarea{resize:vertical;min-height:70px}
    select{appearance:none;cursor:pointer}
    .card{background:var(--surface);border-radius:18px;border:1.5px solid var(--border);transition:all .2s;cursor:pointer;overflow:hidden}
    .card:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover);border-color:var(--border-strong)}
    .tag{display:inline-block;background:var(--tag-bg);color:var(--tag-text);border-radius:6px;padding:3px 10px;font-size:12px;font-weight:500;margin:2px}
    .tag-accent{background:var(--accent-light);color:var(--accent)}
    .cat-chip{background:var(--surface);color:var(--text2);border:1.5px solid var(--border);border-radius:20px;padding:6px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
    .cat-chip:hover{border-color:var(--accent);color:var(--accent)}
    .cat-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .unit-toggle{display:flex;background:var(--tag-bg);border-radius:20px;padding:3px;gap:2px}
    .unit-toggle button{border:none;border-radius:16px;padding:5px 14px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--text2);transition:all .15s}
    .unit-toggle button.active{background:var(--surface);color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.1)}
    .ing-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px}
    .ing-row:last-child{border-bottom:none}
    .ing-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;flex-shrink:0}
    .step-row-display{display:flex;gap:16px;align-items:flex-start;margin-bottom:16px}
    .step-num{background:var(--accent);color:#fff;border-radius:8px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;margin-top:1px}
    .form-label{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:7px}
    .remove-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:2px 6px;border-radius:6px;line-height:1;transition:color .1s;flex-shrink:0}
    .remove-btn:hover{color:var(--danger);background:var(--danger-light)}
    .add-row-btn{background:transparent;border:1.5px dashed var(--border-strong);color:var(--text2);border-radius:8px;padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;width:100%;margin-top:6px;transition:all .15s}
    .add-row-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
    .import-box{background:var(--accent-light);border:1.5px solid #b7d9c8;border-radius:12px;padding:18px;margin-bottom:24px}
    .import-row{display:flex;gap:8px}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .source-badge{font-size:13px;color:var(--text2);font-weight:500}
    .source-badge a{color:var(--accent);text-decoration:none;font-weight:600}
    .source-badge a:hover{text-decoration:underline}
    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:11px 24px;border-radius:30px;font-size:14px;font-weight:500;z-index:999;animation:fadeup .25s ease;white-space:nowrap;pointer-events:none}
    @keyframes fadeup{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    .divider{border:none;border-top:1.5px solid var(--border);margin:22px 0}
    .schedule-box{background:#f0f7f4;border:1.5px solid #b7d9c8;border-radius:14px;padding:22px;margin-top:4px}
    .schedule-step-row{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid #cde8da}
    .schedule-step-row:last-child{border-bottom:none}
    .sched-dot{width:10px;height:10px;background:var(--accent);border-radius:50%;flex-shrink:0;margin-top:4px}
    .sched-time{font-size:13px;font-weight:700;color:var(--accent);min-width:95px;padding-top:2px}
    .sched-name{font-size:14px;flex:1;line-height:1.4}
    .dur-input{width:65px;padding:4px 8px;border:1.5px solid #b7d9c8;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13px;background:var(--surface);color:var(--text);outline:none;text-align:center}
    .dur-input:focus{border-color:var(--accent)}
    .emoji-btn{font-size:20px;padding:5px 7px;background:var(--tag-bg);border:1.5px solid transparent;border-radius:8px;cursor:pointer;transition:all .1s;width:auto}
    .emoji-btn:hover{background:var(--border)}
    .emoji-btn.sel{border-color:var(--accent);background:var(--accent-light)}
    .fav-btn{background:none;border:none;cursor:pointer;font-size:20px;transition:transform .15s;padding:4px;border-radius:6px}
    .fav-btn:hover{transform:scale(1.2)}
    header{background:var(--surface);border-bottom:1.5px solid var(--border);padding:0 28px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    #app{max-width:1080px;margin:0 auto;padding:28px 20px}
    .panel{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:32px 28px;box-shadow:var(--shadow)}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:18px}
    .ing-form-grid{display:grid;grid-template-columns:1fr 68px 76px 68px 68px 28px;gap:5px;margin-bottom:5px;align-items:center}
    .ing-form-grid input,.ing-form-grid select{padding:8px 8px;font-size:13px}
    @media(max-width:600px){
      .ing-form-grid{grid-template-columns:1fr 58px 68px 58px 58px 24px}
      .panel{padding:20px 16px}
      header{padding:0 16px}
    }
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
    .serif{font-family:'DM Serif Display',serif}
    .hidden{display:none!important}
  </style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:10px">
    <span style="font-size:24px">🍽️</span>
    <span class="serif" style="font-size:22px;letter-spacing:-.02em">Recipes</span>
  </div>
  <button class="btn btn-primary" id="btn-new">+ New Recipe</button>
</header>

<div id="app">
  <!-- views injected here -->
</div>

<div id="toast" class="toast hidden"></div>

<script>
// ─── Constants ───────────────────────────────────────────────────────────────
const CATEGORIES = ["Breakfast","Lunch","Dinner","Dessert","Snacks","Drinks","Soups","Salads","Baking","Sourdough","Other"];
const EMOJI_LIST = ["🍞","🥖","🫓","🍎","🍋","🥧","🍝","🥗","🍲","🥞","🍕","🍜","🥘","🫕","🍱","🥩","🍗","🥦","🥕","🍳","🧁","🎂","🍰","☕","🫖","🍵","🥤","🍹","🥐","🥨","🧀","🥚","🥓","🌮","🌯","🧆"];
const CUP_UNITS = ["cup","tbsp","tsp","oz","lb","pinch","to taste","whole","slice","clove","handful"];
const GRAM_UNITS = ["g","kg","ml","L","pinch","to taste","whole","slice","clove","handful"];
const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const STORAGE_KEY = "myrecipebook_v4";

const SAMPLE_RECIPES = [
  { id:1, title:"Grandma's Apple Pie", category:"Dessert", tags:"sweet, classic, fall", sourceUrl:"", favorite:true, emoji:"🍎", time:"1h 15m",
    ingredients:[{name:"Apples",cups:"6",cupsUnit:"whole",grams:"900",gramsUnit:"g"},{name:"Flour",cups:"2",cupsUnit:"cup",grams:"240",gramsUnit:"g"},{name:"Sugar",cups:"1",cupsUnit:"cup",grams:"200",gramsUnit:"g"},{name:"Butter",cups:"½",cupsUnit:"cup",grams:"113",gramsUnit:"g"},{name:"Cinnamon",cups:"1",cupsUnit:"tsp",grams:"2.5",gramsUnit:"g"}],
    steps:["Peel and slice apples. Toss with sugar and cinnamon.","Make crust: combine flour and cold butter until crumbly. Add ice water until dough forms.","Roll out half the dough and line a 9-inch pie dish.","Fill with apple mixture. Top with remaining dough and crimp edges.","Bake at 375°F for 45 minutes until golden brown."]
  },
  { id:2, title:"Classic Sourdough Loaf", category:"Sourdough", tags:"bread, fermented, crusty", sourceUrl:"", favorite:true, emoji:"🍞", time:"24h",
    ingredients:[{name:"Bread flour",cups:"4",cupsUnit:"cup",grams:"500",gramsUnit:"g"},{name:"Water",cups:"1⅓",cupsUnit:"cup",grams:"375",gramsUnit:"ml"},{name:"Active starter",cups:"½",cupsUnit:"cup",grams:"100",gramsUnit:"g"},{name:"Salt",cups:"1¾",cupsUnit:"tsp",grams:"10",gramsUnit:"g"}],
    steps:["Mix flour and water together. Rest 30 minutes (autolyse).","Add starter and salt. Mix well until fully incorporated.","Perform 4 sets of stretch and folds every 30 minutes over 2 hours.","Bulk ferment at room temperature 4–6 hours until risen 50%.","Shape into a boule, place in floured banneton seam-side up.","Cold proof in fridge overnight (8–16 hours).","Preheat oven with Dutch oven inside at 500°F for 1 hour.","Score the dough. Bake covered 20 min, then uncovered 20–25 min until deep brown."]
  }
];

// ─── State ────────────────────────────────────────────────────────────────────
let state = {
  recipes: [],
  view: "grid",       // grid | detail | form
  selectedId: null,
  search: "",
  filterCat: "All",
  filterFav: false,
  unitMode: "cups",
  form: emptyForm(),
  formMode: "add",    // add | edit
  importing: false,
  importError: "",
  schedEndDay: new Date().getDay(),
  schedEndHour: 8,
  schedEndMinute: 0,
  schedEndAmpm: "AM",
  schedDurations: [],
};

function emptyForm() {
  return { title:"", category:"Dinner", tags:"", ingredients:[emptyIng()], steps:[""], emoji:"🍽️", time:"", favorite:false, sourceUrl:"" };
}
function emptyIng() { return {name:"",cups:"",cupsUnit:"cup",grams:"",gramsUnit:"g"}; }

// ─── Persistence ──────────────────────────────────────────────────────────────
function loadRecipes() {
  try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : SAMPLE_RECIPES; }
  catch { return SAMPLE_RECIPES; }
}
function saveRecipes() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.recipes)); } catch {}
}

// ─── Toast ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.remove("hidden");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.add("hidden"), 2500);
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function hostname(url) { try { return new URL(url).hostname.replace("www.",""); } catch { return url; } }
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function ingDisplay(ing) {
  if (state.unitMode === "grams") return `${esc(ing.grams||"—")} ${esc(ing.gramsUnit)}`;
  return `${esc(ing.cups||"—")} ${esc(ing.cupsUnit)}`;
}
function guessDuration(step) {
  const t = step.toLowerCase();
  if (t.includes("overnight")||t.includes("cold proof")||t.includes("8–16")||t.includes("8-16")) return 600;
  if (t.includes("bulk ferment")||t.includes("4–6")||t.includes("4-6 hour")) return 300;
  if (t.includes("preheat")&&t.includes("1 hour")) return 60;
  if (t.includes("autolyse")||t.includes("30 min")) return 30;
  if (t.includes("stretch and fold")||t.includes("2 hour")) return 120;
  if (t.includes("shape")) return 15;
  if (t.includes("score")||t.includes("bake covered")) return 45;
  if (t.includes("mix")) return 10;
  return 20;
}
function fmtSchedTime(date) {
  const D=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const h=date.getHours(), m=date.getMinutes();
  const ap=h>=12?"PM":"AM", h12=h%12||12, mm=m.toString().padStart(2,"0");
  return `${D[date.getDay()]} ${h12}:${mm} ${ap}`;
}
function buildSchedule() {
  const target = new Date();
  target.setSeconds(0,0);
  let h = state.schedEndHour % 12;
  if (state.schedEndAmpm === "PM") h += 12;
  target.setHours(h, state.schedEndMinute);
  const today = target.getDay();
  let daysUntil = (state.schedEndDay - today + 7) % 7;
  if (daysUntil === 0 && target <= new Date()) daysUntil = 7;
  target.setDate(target.getDate() + daysUntil);
  const totalMins = state.schedDurations.reduce((a,b)=>a+b,0);
  let cursor = target.getTime() - totalMins*60000;
  const recipe = state.recipes.find(r=>r.id===state.selectedId);
  return (recipe.steps||[]).map((step,i)=>{
    const start = new Date(cursor);
    cursor += state.schedDurations[i]*60000;
    return {step, start, dur: state.schedDurations[i]};
  });
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  if (state.view === "grid") app.innerHTML = renderGrid();
  else if (state.view === "detail") app.innerHTML = renderDetail();
  else if (state.view === "form") app.innerHTML = renderForm();
  bindEvents();
}

// ── Grid ──────────────────────────────────────────────────────────────────────
function renderGrid() {
  const filtered = state.recipes.filter(r => {
    const q = state.search.toLowerCase();
    const ingText = (r.ingredients||[]).map(i=>i.name).join(" ").toLowerCase();
    return (!q || r.title.toLowerCase().includes(q) || (r.tags||"").toLowerCase().includes(q) || ingText.includes(q))
      && (state.filterCat==="All" || r.category===state.filterCat)
      && (!state.filterFav || r.favorite);
  });

  const chips = ["All",...CATEGORIES].map(c =>
    `<button class="cat-chip${state.filterCat===c?" active":""}" data-cat="${esc(c)}">${esc(c)}</button>`
  ).join("");

  const cards = filtered.length === 0
    ? `<div style="text-align:center;padding:80px 0;color:var(--text3)">
        <div style="font-size:48px;margin-bottom:16px">🍽️</div>
        <div class="serif" style="font-size:22px;color:var(--text2);margin-bottom:8px">No recipes found</div>
        <div style="font-size:14px">Try a different search or add a new recipe</div>
       </div>`
    : `<div class="grid">${filtered.map(r => `
      <div class="card" data-recipe="${r.id}" style="padding:22px 20px 18px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
          <div style="width:48px;height:48px;background:var(--bg);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px">${esc(r.emoji||"🍽️")}</div>
          <button class="fav-btn" data-fav="${r.id}">${r.favorite?"❤️":"🤍"}</button>
        </div>
        <div class="serif" style="font-size:18px;line-height:1.25;margin-bottom:8px">${esc(r.title)}</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px">
          <span class="tag tag-accent">${esc(r.category)}</span>
          ${r.time?`<span class="tag">⏱ ${esc(r.time)}</span>`:""}
        </div>
        <div style="font-size:12px;color:var(--text3);margin-bottom:8px;line-height:1.5">
          ${(r.ingredients||[]).slice(0,3).map(i=>esc(i.name)).filter(Boolean).join(" · ")}${(r.ingredients||[]).length>3?` +${r.ingredients.length-3}`:""}
        </div>
        ${r.tags?`<div style="display:flex;flex-wrap:wrap;gap:3px">${r.tags.split(",").filter(Boolean).slice(0,3).map(t=>`<span class="tag" style="font-size:11px">${esc(t.trim())}</span>`).join("")}</div>`:""}
        ${r.sourceUrl?`<div style="font-size:11px;color:var(--text3);margin-top:10px">🔗 ${esc(hostname(r.sourceUrl))}</div>`:""}
      </div>`).join("")}</div>`;

  return `
    <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
      <div style="flex:1;min-width:200px;position:relative">
        <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px">⌕</span>
        <input id="search-input" style="padding-left:34px" placeholder="Search recipes, ingredients, tags…" value="${esc(state.search)}" />
      </div>
      <button class="btn ${state.filterFav?"btn-primary":"btn-ghost"}" id="btn-fav">${state.filterFav?"❤️":"♡"} Favorites</button>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:28px">${chips}</div>
    ${cards}`;
}

// ── Detail ────────────────────────────────────────────────────────────────────
function renderDetail() {
  const r = state.recipes.find(r=>r.id===state.selectedId);
  if (!r) return "";

  const ings = (r.ingredients||[]).map(ing=>`
    <div class="ing-row">
      <div class="ing-dot"></div>
      <div style="flex:1">${esc(ing.name)}</div>
      <div style="color:var(--accent);font-weight:600;font-size:14px;white-space:nowrap">${ingDisplay(ing)}</div>
    </div>`).join("");

  const steps = (r.steps||[]).map((s,i)=>`
    <div class="step-row-display">
      <div class="step-num">${i+1}</div>
      <div style="font-size:15px;line-height:1.7;padding-top:3px">${esc(s)}</div>
    </div>`).join("");

  const schedHtml = r.category==="Sourdough" && r.steps?.length ? renderSchedule(r) : "";

  return `
    <div style="max-width:680px;margin:0 auto">
      <button class="btn btn-ghost" id="btn-back" style="margin-bottom:20px">← Back</button>
      <div class="panel">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">
          <div style="width:64px;height:64px;background:var(--bg);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:36px">${esc(r.emoji||"🍽️")}</div>
          <button class="fav-btn" data-fav="${r.id}" style="font-size:24px">${r.favorite?"❤️":"🤍"}</button>
        </div>
        <h1 class="serif" style="font-size:30px;line-height:1.2;margin-bottom:12px">${esc(r.title)}</h1>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:${r.sourceUrl?"12px":"20px"}">
          <span class="tag tag-accent" style="font-size:13px">${esc(r.category)}</span>
          ${r.time?`<span class="tag" style="font-size:13px">⏱ ${esc(r.time)}</span>`:""}
          ${r.tags?r.tags.split(",").filter(Boolean).map(t=>`<span class="tag" style="font-size:13px">${esc(t.trim())}</span>`).join(""):""}
        </div>
        ${r.sourceUrl?`<div style="margin-bottom:18px" class="source-badge">Source: <a href="${esc(r.sourceUrl)}" target="_blank" rel="noopener noreferrer">${esc(hostname(r.sourceUrl))} ↗</a></div>`:""}
        <hr class="divider"/>
        <div style="margin-bottom:24px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
            <h2 class="serif" style="font-size:20px">Ingredients</h2>
            <div class="unit-toggle">
              <button class="${state.unitMode==="cups"?"active":""}" data-unit="cups">Cups</button>
              <button class="${state.unitMode==="grams"?"active":""}" data-unit="grams">Grams</button>
            </div>
          </div>
          <div style="background:var(--bg);border-radius:10px;padding:0 16px">${ings}</div>
        </div>
        <hr class="divider" style="margin:0 0 24px"/>
        <div style="margin-bottom:${r.category==="Sourdough"?"24px":"28px"}">
          <h2 class="serif" style="font-size:20px;margin-bottom:16px">Instructions</h2>
          ${steps}
        </div>
        ${schedHtml}
        <div style="display:flex;gap:8px;margin-top:28px">
          <button class="btn btn-primary" id="btn-edit">Edit Recipe</button>
          <button class="btn btn-danger" id="btn-delete">Delete</button>
        </div>
      </div>
    </div>`;
}

function renderSchedule(r) {
  if (!state.schedDurations.length || state.schedDurations.length !== r.steps.length) {
    state.schedDurations = r.steps.map(guessDuration);
  }
  const sched = buildSchedule();
  const totalMins = state.schedDurations.reduce((a,b)=>a+b,0);
  const hrs = Math.floor(totalMins/60), mins = totalMins%60;

  const hours = Array.from({length:12},(_,i)=>i+1);
  const minutes = ["00","15","30","45"];

  return `
    <hr class="divider" style="margin:0 0 24px"/>
    <div class="schedule-box">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px">
        <h2 class="serif" style="font-size:20px;color:var(--accent)">🕐 Baking Schedule</h2>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px">
        <span style="font-size:13px;font-weight:600;color:var(--text2)">Ready by:</span>
        <select id="sched-day" style="width:auto;padding:6px 10px;font-size:13px">
          ${DAYS.map((d,i)=>`<option value="${i}"${state.schedEndDay===i?" selected":""}>${d}</option>`).join("")}
        </select>
        <select id="sched-hour" style="width:60px;padding:6px 8px;font-size:13px">
          ${hours.map(h=>`<option value="${h}"${state.schedEndHour===h?" selected":""}>${h}</option>`).join("")}
        </select>
        <select id="sched-min" style="width:60px;padding:6px 8px;font-size:13px">
          ${minutes.map(m=>`<option value="${Number(m)}"${state.schedEndMinute===Number(m)?" selected":""}>${m}</option>`).join("")}
        </select>
        <select id="sched-ampm" style="width:65px;padding:6px 8px;font-size:13px">
          <option${state.schedEndAmpm==="AM"?" selected":""}>AM</option>
          <option${state.schedEndAmpm==="PM"?" selected":""}>PM</option>
        </select>
      </div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:14px">Adjust step durations — times update automatically.</div>
      ${sched.map((s,i)=>`
        <div class="schedule-step-row">
          <div class="sched-dot"></div>
          <div style="flex:1">
            <div class="sched-time">${fmtSchedTime(s.start)}</div>
            <div class="sched-name">${esc(s.step)}</div>
          </div>
          <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
            <input type="number" class="dur-input" data-dur="${i}" value="${s.dur}" min="1"/>
            <span style="font-size:11px;color:var(--text3)">min</span>
          </div>
        </div>`).join("")}
      <div style="margin-top:14px;padding-top:14px;border-top:1px solid #cde8da;display:flex;justify-content:space-between">
        <span style="font-size:13px;color:var(--text2)">Total time</span>
        <span style="font-size:14px;font-weight:700;color:var(--accent)">${hrs}h ${mins}m</span>
      </div>
    </div>`;
}

// ── Form ──────────────────────────────────────────────────────────────────────
function renderForm() {
  const f = state.form;
  const isEdit = state.formMode === "edit";

  const catOptions = CATEGORIES.map(c=>`<option${f.category===c?" selected":""}>${esc(c)}</option>`).join("");

  const ingRows = f.ingredients.map((ing,i)=>`
    <div class="ing-form-grid">
      <input data-ing="${i}" data-field="name" placeholder="Flour" value="${esc(ing.name)}"/>
      <input data-ing="${i}" data-field="cups" placeholder="2" value="${esc(ing.cups)}"/>
      <select data-ing="${i}" data-field="cupsUnit">${CUP_UNITS.map(u=>`<option${ing.cupsUnit===u?" selected":""}>${u}</option>`).join("")}</select>
      <input data-ing="${i}" data-field="grams" placeholder="240" value="${esc(ing.grams)}"/>
      <select data-ing="${i}" data-field="gramsUnit">${GRAM_UNITS.map(u=>`<option${ing.gramsUnit===u?" selected":""}>${u}</option>`).join("")}</select>
      <button class="remove-btn" data-remove-ing="${i}">×</button>
    </div>`).join("");

  const stepRows = f.steps.map((s,i)=>`
    <div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:8px">
      <div style="background:var(--accent-light);color:var(--accent);border-radius:8px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:11px">${i+1}</div>
      <textarea data-step="${i}" placeholder="Step ${i+1}…" style="min-height:60px;font-size:14px">${esc(s)}</textarea>
      <button class="remove-btn" data-remove-step="${i}" style="margin-top:11px">×</button>
    </div>`).join("");

  const emojiBtns = EMOJI_LIST.map(e=>`<button class="emoji-btn${f.emoji===e?" sel":""}" data-emoji="${e}">${e}</button>`).join("");

  return `
    <div style="max-width:720px;margin:0 auto">
      <button class="btn btn-ghost" id="btn-back" style="margin-bottom:20px">← Back</button>
      <div class="panel" style="padding:28px 24px">
        <h2 class="serif" style="font-size:26px;margin-bottom:24px">${isEdit?"Edit Recipe":"New Recipe"}</h2>

        ${!isEdit?`
        <div class="import-box">
          <div style="font-weight:600;font-size:14px;color:var(--accent);margin-bottom:6px">✦ Import from URL</div>
          <div style="font-size:13px;color:var(--text2);margin-bottom:12px">Paste any recipe link and AI will fill in the form automatically.</div>
          <div class="import-row">
            <input id="import-url" placeholder="https://..." value="${esc(state.importUrl||"")}" ${state.importing?"disabled":""}/>
            <button class="btn btn-primary" id="btn-import" ${state.importing||!state.importUrl?"disabled":""} style="white-space:nowrap;min-width:100px">
              ${state.importing?'<span class="spinner"></span> Importing':"Import"}
            </button>
          </div>
          ${state.importError?`<div style="font-size:12px;color:var(--danger);margin-top:8px">⚠ ${esc(state.importError)}</div>`:""}
        </div>`:""}

        <div style="margin-bottom:16px">
          <label class="form-label">Source URL (optional)</label>
          <input id="f-sourceUrl" placeholder="https://..." value="${esc(f.sourceUrl||"")}"/>
        </div>
        <div style="margin-bottom:16px">
          <label class="form-label">Recipe Name *</label>
          <input id="f-title" placeholder="e.g. Sourdough Discard Pancakes" value="${esc(f.title)}"/>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
          <div>
            <label class="form-label">Category</label>
            <select id="f-category">${catOptions}</select>
          </div>
          <div>
            <label class="form-label">Cook Time</label>
            <input id="f-time" placeholder="e.g. 45m or 1h 30m" value="${esc(f.time)}"/>
          </div>
        </div>
        <div style="margin-bottom:16px">
          <label class="form-label">Emoji</label>
          <div style="display:flex;flex-wrap:wrap;gap:4px">${emojiBtns}</div>
        </div>
        <div style="margin-bottom:16px">
          <label class="form-label">Tags</label>
          <input id="f-tags" placeholder="e.g. easy, vegetarian, quick" value="${esc(f.tags)}"/>
        </div>

        <div style="margin-bottom:20px">
          <label class="form-label" style="margin-bottom:10px">Ingredients</label>
          <div class="ing-form-grid" style="margin-bottom:6px">
            ${["Ingredient","Cups/Amt","Unit","Grams","Unit",""].map(l=>`<div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">${l}</div>`).join("")}
          </div>
          <div id="ing-rows">${ingRows}</div>
          <button class="add-row-btn" id="btn-add-ing">+ Add Ingredient</button>
        </div>

        <div style="margin-bottom:22px">
          <label class="form-label" style="margin-bottom:10px">Instructions</label>
          <div id="step-rows">${stepRows}</div>
          <button class="add-row-btn" id="btn-add-step">+ Add Step</button>
        </div>

        <div style="display:flex;align-items:center;gap:8px;margin-bottom:24px">
          <input type="checkbox" id="f-fav" ${f.favorite?"checked":""} style="width:16px;height:16px;accent-color:var(--accent);cursor:pointer"/>
          <label for="f-fav" style="font-size:14px;font-weight:500;cursor:pointer;user-select:none">Mark as favorite</label>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary" id="btn-save" style="font-size:15px;padding:11px 24px">${isEdit?"Save Changes":"Add Recipe"}</button>
          <button class="btn btn-ghost" id="btn-cancel">Cancel</button>
        </div>
      </div>
    </div>`;
}

// ─── Events ───────────────────────────────────────────────────────────────────
function bindEvents() {
  const on = (id, ev, fn) => { const el=document.getElementById(id); if(el) el.addEventListener(ev, fn); };
  const onAll = (sel, ev, fn) => document.querySelectorAll(sel).forEach(el=>el.addEventListener(ev,fn));

  // Header
  document.getElementById("btn-new").onclick = () => {
    state.form = emptyForm(); state.formMode = "add"; state.importUrl = ""; state.importError = "";
    state.view = "form"; render();
  };

  if (state.view === "grid") {
    on("search-input","input", e=>{ state.search=e.target.value; render(); });
    on("btn-fav","click", ()=>{ state.filterFav=!state.filterFav; render(); });
    onAll(".cat-chip","click", e=>{ state.filterCat=e.target.dataset.cat; render(); });
    onAll("[data-recipe]","click", e=>{
      const card = e.target.closest("[data-recipe]");
      if(card && !e.target.closest("[data-fav]")) { state.selectedId=Number(card.dataset.recipe); state.schedDurations=[]; state.view="detail"; render(); }
    });
    onAll("[data-fav]","click", e=>{ e.stopPropagation(); toggleFav(Number(e.currentTarget.dataset.fav)); });
  }

  if (state.view === "detail") {
    on("btn-back","click",()=>{ state.view="grid"; render(); });
    on("btn-edit","click",()=>{
      const r=state.recipes.find(r=>r.id===state.selectedId);
      state.form={...r,ingredients:r.ingredients?.length?[...r.ingredients.map(i=>({...i}))]: [emptyIng()],steps:r.steps?.length?[...r.steps]:[""]}; 
      state.formMode="edit"; state.importError=""; state.view="form"; render();
    });
    on("btn-delete","click",()=>{
      if(confirm("Delete this recipe?")) { state.recipes=state.recipes.filter(r=>r.id!==state.selectedId); saveRecipes(); state.view="grid"; render(); showToast("Recipe deleted"); }
    });
    onAll("[data-fav]","click", e=>{ toggleFav(Number(e.currentTarget.dataset.fav)); });
    onAll("[data-unit]","click", e=>{ state.unitMode=e.target.dataset.unit; render(); });
    // Schedule
    on("sched-day","change",e=>{ state.schedEndDay=Number(e.target.value); renderScheduleOnly(); });
    on("sched-hour","change",e=>{ state.schedEndHour=Number(e.target.value); renderScheduleOnly(); });
    on("sched-min","change",e=>{ state.schedEndMinute=Number(e.target.value); renderScheduleOnly(); });
    on("sched-ampm","change",e=>{ state.schedEndAmpm=e.target.value; renderScheduleOnly(); });
    onAll("[data-dur]","input", e=>{
      const i=Number(e.target.dataset.dur);
      state.schedDurations[i]=Math.max(1,parseInt(e.target.value)||1);
      renderScheduleOnly();
    });
  }

  if (state.view === "form") {
    on("btn-back","click",()=>{ state.view=state.formMode==="edit"?"detail":"grid"; render(); });
    on("btn-cancel","click",()=>{ state.view=state.formMode==="edit"?"detail":"grid"; render(); });
    on("btn-save","click", saveRecipe);
    on("btn-add-ing","click",()=>{ state.form.ingredients.push(emptyIng()); renderFormPartial(); });
    on("btn-add-step","click",()=>{ state.form.steps.push(""); renderFormPartial(); });

    // Import
    on("import-url","input", e=>{ state.importUrl=e.target.value; state.importError="";
      const btn=document.getElementById("btn-import"); if(btn) btn.disabled=!e.target.value.trim(); });
    on("import-url","keydown", e=>{ if(e.key==="Enter"&&!state.importing) doImport(); });
    on("btn-import","click", doImport);

    // Form fields
    const fields=["title","category","time","tags","sourceUrl"];
    fields.forEach(f=>{ const el=document.getElementById("f-"+f); if(el) el.addEventListener("input",e=>{ state.form[f]=e.target.value; if(f==="category"||f==="title"){} }); });
    const favEl=document.getElementById("f-fav"); if(favEl) favEl.addEventListener("change",e=>{ state.form.favorite=e.target.checked; });

    // Ingredient fields
    onAll("[data-ing]","input", e=>{ const i=Number(e.target.dataset.ing),field=e.target.dataset.field; state.form.ingredients[i][field]=e.target.value; });
    onAll("[data-ing]","change", e=>{ const i=Number(e.target.dataset.ing),field=e.target.dataset.field; state.form.ingredients[i][field]=e.target.value; });
    onAll("[data-remove-ing]","click", e=>{ const i=Number(e.target.dataset.removeIng); state.form.ingredients.splice(i,1); if(!state.form.ingredients.length) state.form.ingredients.push(emptyIng()); renderFormPartial(); });

    // Step fields
    onAll("[data-step]","input", e=>{ state.form.steps[Number(e.target.dataset.step)]=e.target.value; });
    onAll("[data-remove-step]","click", e=>{ const i=Number(e.target.dataset.removeStep); state.form.steps.splice(i,1); if(!state.form.steps.length) state.form.steps.push(""); renderFormPartial(); });

    // Emoji
    onAll("[data-emoji]","click", e=>{ state.form.emoji=e.target.dataset.emoji; document.querySelectorAll("[data-emoji]").forEach(b=>b.classList.toggle("sel",b.dataset.emoji===state.form.emoji)); });
  }
}

function renderScheduleOnly() {
  const r = state.recipes.find(r=>r.id===state.selectedId);
  if (!r) return;
  const box = document.querySelector(".schedule-box");
  if (!box) return;
  const newHtml = renderSchedule(r);
  const tmp = document.createElement("div");
  tmp.innerHTML = newHtml;
  box.replaceWith(tmp.firstElementChild);
  // Rebind schedule inputs
  const on=(id,ev,fn)=>{const el=document.getElementById(id);if(el)el.addEventListener(ev,fn);};
  on("sched-day","change",e=>{state.schedEndDay=Number(e.target.value);renderScheduleOnly();});
  on("sched-hour","change",e=>{state.schedEndHour=Number(e.target.value);renderScheduleOnly();});
  on("sched-min","change",e=>{state.schedEndMinute=Number(e.target.value);renderScheduleOnly();});
  on("sched-ampm","change",e=>{state.schedEndAmpm=e.target.value;renderScheduleOnly();});
  document.querySelectorAll("[data-dur]").forEach(el=>el.addEventListener("input",e=>{
    const i=Number(e.target.dataset.dur);
    state.schedDurations[i]=Math.max(1,parseInt(e.target.value)||1);
    renderScheduleOnly();
  }));
}

function renderFormPartial() {
  // Re-render just ingredient and step rows without losing other field values
  syncFormFields();
  const ingContainer = document.getElementById("ing-rows");
  const stepContainer = document.getElementById("step-rows");
  if (ingContainer) {
    ingContainer.innerHTML = state.form.ingredients.map((ing,i)=>`
      <div class="ing-form-grid">
        <input data-ing="${i}" data-field="name" placeholder="Flour" value="${esc(ing.name)}"/>
        <input data-ing="${i}" data-field="cups" placeholder="2" value="${esc(ing.cups)}"/>
        <select data-ing="${i}" data-field="cupsUnit">${CUP_UNITS.map(u=>`<option${ing.cupsUnit===u?" selected":""}>${u}</option>`).join("")}</select>
        <input data-ing="${i}" data-field="grams" placeholder="240" value="${esc(ing.grams)}"/>
        <select data-ing="${i}" data-field="gramsUnit">${GRAM_UNITS.map(u=>`<option${ing.gramsUnit===u?" selected":""}>${u}</option>`).join("")}</select>
        <button class="remove-btn" data-remove-ing="${i}">×</button>
      </div>`).join("");
  }
  if (stepContainer) {
    stepContainer.innerHTML = state.form.steps.map((s,i)=>`
      <div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:8px">
        <div style="background:var(--accent-light);color:var(--accent);border-radius:8px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:11px">${i+1}</div>
        <textarea data-step="${i}" placeholder="Step ${i+1}…" style="min-height:60px;font-size:14px">${esc(s)}</textarea>
        <button class="remove-btn" data-remove-step="${i}" style="margin-top:11px">×</button>
      </div>`).join("");
  }
  // Rebind
  document.querySelectorAll("[data-ing]").forEach(el=>{ el.addEventListener(el.tagName==="SELECT"?"change":"input",e=>{const i=Number(e.target.dataset.ing),f=e.target.dataset.field;state.form.ingredients[i][f]=e.target.value;}); });
  document.querySelectorAll("[data-remove-ing]").forEach(el=>el.addEventListener("click",e=>{const i=Number(e.target.dataset.removeIng);state.form.ingredients.splice(i,1);if(!state.form.ingredients.length)state.form.ingredients.push(emptyIng());renderFormPartial();}));
  document.querySelectorAll("[data-step]").forEach(el=>el.addEventListener("input",e=>{state.form.steps[Number(e.target.dataset.step)]=e.target.value;}));
  document.querySelectorAll("[data-remove-step]").forEach(el=>el.addEventListener("click",e=>{const i=Number(e.target.dataset.removeStep);state.form.steps.splice(i,1);if(!state.form.steps.length)state.form.steps.push("");renderFormPartial();}));
}

function syncFormFields() {
  const get = id => { const el=document.getElementById(id); return el?el.value:null; };
  const fields = ["title","category","time","tags","sourceUrl"];
  fields.forEach(f=>{ const v=get("f-"+f); if(v!==null) state.form[f]=v; });
  const fav=document.getElementById("f-fav"); if(fav) state.form.favorite=fav.checked;
}

function toggleFav(id) {
  state.recipes = state.recipes.map(r=>r.id===id?{...r,favorite:!r.favorite}:r);
  saveRecipes();
  if(state.selectedId===id) { const r=state.recipes.find(r=>r.id===id); document.querySelectorAll(`[data-fav="${id}"]`).forEach(b=>b.textContent=r.favorite?"❤️":"🤍"); }
  else render();
}

function saveRecipe() {
  syncFormFields();
  const f = state.form;
  if (!f.title.trim()) { showToast("Please enter a recipe name"); return; }
  const cleaned = {...f, ingredients:f.ingredients.filter(i=>i.name.trim()), steps:f.steps.filter(s=>s.trim())};
  if (state.formMode==="edit") {
    state.recipes = state.recipes.map(r=>r.id===state.selectedId?{...r,...cleaned}:r);
    saveRecipes(); state.view="detail"; render(); showToast("Recipe updated");
  } else {
    state.recipes = [{...cleaned, id:Date.now()}, ...state.recipes];
    saveRecipes(); state.view="grid"; render(); showToast("Recipe added");
  }
}

async function doImport() {
  const urlEl = document.getElementById("import-url");
  const url = urlEl ? urlEl.value.trim() : "";
  if (!url) return;
  state.importing=true; state.importError=""; state.importUrl=url;
  render();
  try {
    const prompt = `You are a recipe extraction assistant. Use web search to fetch and read the content at this URL, then extract the recipe and return ONLY a raw JSON object (no markdown, no backticks, no explanation).

URL: ${url}

Return exactly this structure:
{"title":"Recipe name","category":"One of: Breakfast,Lunch,Dinner,Dessert,Snacks,Drinks,Soups,Salads,Baking,Sourdough,Other","tags":"comma-separated tags","time":"e.g. 45m","emoji":"single emoji","ingredients":[{"name":"","cups":"","cupsUnit":"cup","grams":"","gramsUnit":"g"}],"steps":["Step 1","Step 2"]}

Convert all ingredient amounts to both cups/tbsp/tsp AND grams/ml.`;

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,tools:[{type:"web_search_20250305",name:"web_search"}],messages:[{role:"user",content:prompt}]})
    });
    if (!response.ok) { const e=await response.json().catch(()=>({})); throw new Error(e.error?.message||`Error ${response.status}`); }
    const data = await response.json();
    const text = data.content.filter(b=>b.type==="text").map(b=>b.text).join("");
    const clean = text.replace(/```json|```/g,"").trim();
    const start=clean.indexOf("{"), end=clean.lastIndexOf("}");
    if(start===-1||end===-1) throw new Error("No JSON found");
    const parsed = JSON.parse(clean.slice(start,end+1));
    state.form = {...emptyForm(), ...parsed, sourceUrl:url, ingredients:parsed.ingredients?.length?parsed.ingredients:[emptyIng()], steps:parsed.steps?.length?parsed.steps:[""], favorite:false};
    state.importUrl=""; state.importError=""; state.importing=false;
    render(); showToast("Recipe imported — review and save ✓");
  } catch(e) {
    state.importError="Couldn't import that URL. Try another or fill in manually.";
    state.importing=false; render();
  }
}

// ─── Init ─────────────────────────────────────────────────────────────────────
state.recipes = loadRecipes();
render();
</script>
