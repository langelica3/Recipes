/* Buttons */
.btn { border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 600; border-radius: 8px; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary { background: var(--accent); color: #fff; padding: 10px 20px; font-size: 14px; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-ghost { background: transparent; color: var(--text-secondary); border: 1.5px solid var(--border-strong); padding: 8px 16px; font-size: 14px; }
.btn-ghost:hover { background: var(--tag-bg); color: var(--text); }
.btn-danger { background: transparent; color: var(--danger); border: 1.5px solid #e8c5c2; padding: 8px 16px; font-size: 14px; }
.btn-danger:hover { background: var(--danger-light); }

/* Inputs */
.input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; background: var(--surface); color: var(--text); outline: none; transition: border 0.15s; }
.input:focus { border-color: var(--accent); }
textarea.input { resize: vertical; min-height: 70px; }
select.input { appearance: none; cursor: pointer; }

/* Cards */
.card { background: var(--surface); border-radius: var(--radius-lg); border: 1.5px solid var(--border); transition: all 0.2s; cursor: pointer; overflow: hidden; }
.card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); border-color: var(--border-strong); }

/* Tags & chips */
.tag { display: inline-block; background: var(--tag-bg); color: var(--tag-text); border-radius: 6px; padding: 3px 10px; font-size: 12px; font-weight: 500; margin: 2px; }
.tag-accent { background: var(--accent-light); color: var(--accent); }
.cat-chip { background: var(--surface); color: var(--text-secondary); border: 1.5px solid var(--border); border-radius: 20px; padding: 6px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.cat-chip:hover { border-color: var(--accent); color: var(--accent); }
.cat-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Fav button */
.fav-btn { background: none; border: none; cursor: pointer; font-size: 20px; transition: transform 0.15s; padding: 4px; border-radius: 6px; }
.fav-btn:hover { transform: scale(1.2); }

/* Unit toggle */
.unit-toggle { display: flex; background: var(--tag-bg); border-radius: 20px; padding: 3px; gap: 2px; }
.unit-toggle button { border: none; border-radius: 16px; padding: 5px 14px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; background: transparent; color: var(--text-secondary); transition: all 0.15s; }
.unit-toggle button.active { background: var(--surface); color: var(--accent); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

/* Ingredient list */
.ing-list-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
.ing-list-item:last-child { border-bottom: none; }
.ing-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; flex-shrink: 0; }

/* Steps */
.step-display { display: flex; gap: 16px; align-items: flex-start; margin-bottom: 16px; }
.step-num { background: var(--accent); color: #fff; border-radius: 8px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
.step-num-edit { background: var(--accent-light); color: var(--accent); border-radius: 8px; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; margin-top: 11px; }

/* Form helpers */
.form-label { font-size: 11px; font-weight: 600; color: var(--text-secondary); letter-spacing: 0.06em; text-transform: uppercase; display: block; margin-bottom: 7px; }
.remove-btn { background: none; border: none; cursor: pointer; color: var(--text-tertiary); font-size: 18px; padding: 2px 6px; border-radius: 6px; line-height: 1; transition: color 0.1s; }
.remove-btn:hover { color: var(--danger); background: var(--danger-light); }
.add-row-btn { background: transparent; border: 1.5px dashed var(--border-strong); color: var(--text-secondary); border-radius: 8px; padding: 8px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; width: 100%; margin-top: 6px; transition: all 0.15s; }
.add-row-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.step-row { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 8px; }

/* Import box */
.import-box { background: var(--accent-light); border: 1.5px solid #b7d9c8; border-radius: var(--radius); padding: 18px; margin-bottom: 24px; }
.import-row { display: flex; gap: 8px; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Source link */
.source-link { display: inline-flex; align-items: center; gap: 6px; background: var(--tag-bg); color: var(--text-secondary); border-radius: 8px; padding: 6px 12px; font-size: 13px; font-weight: 500; text-decoration: none; border: 1.5px solid var(--border); transition: all 0.15s; }
.source-link:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

/* Emoji picker */
.emoji-btn { font-size: 20px; padding: 5px 7px; background: var(--tag-bg); border: 1.5px solid transparent; border-radius: 8px; cursor: pointer; transition: all 0.1s; }
.emoji-btn:hover { background: var(--border); }
.emoji-btn.sel { border-color: var(--accent); background: var(--accent-light); }

/* Toast */
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--text); color: #fff; padding: 11px 24px; border-radius: 30px; font-size: 14px; font-weight: 500; z-index: 999; animation: fadeup 0.25s ease; white-space: nowrap; }
@keyframes fadeup { from { opacity:0; transform: translateX(-50%) translateY(10px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

/* Divider */
.divider { border: none; border-top: 1.5px solid var(--border); margin: 22px 0; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

const CATEGORIES = ["Breakfast","Lunch","Dinner","Dessert","Snacks","Drinks","Soups","Salads","Baking","Sourdough","Other"];

const emptyIng = () => ({ name: "", cups: "", cupsUnit: "cup", grams: "", gramsUnit: "g" });
const emptyForm = () => ({ title: "", category: "Dinner", tags: "", ingredients: [emptyIng()], steps: [""], emoji: "🍽️", time: "", favorite: false, sourceUrl: "" });

async function importRecipeFromUrl(url) {
  const prompt = `You are a recipe extraction assistant. I will give you a URL. Use web search to fetch and read the content at that URL, then extract the recipe information and return it as a JSON object.
```

URL: ${url}

Return ONLY a raw JSON object (no markdown, no backticks, no explanation) with these exact fields:
{
“title”: “Recipe name”,
“category”: “One of: Breakfast, Lunch, Dinner, Dessert, Snacks, Drinks, Soups, Salads, Baking, Sourdough, Other”,
“tags”: “comma-separated tags like easy, vegetarian, quick”,
“time”: “total time e.g. 45m or 1h 30m”,
“emoji”: “a single relevant emoji”,
“ingredients”: [
{ “name”: “Ingredient name”, “cups”: “amount in cups/tbsp/tsp”, “cupsUnit”: “cup or tbsp or tsp or oz or lb or pinch or to taste or whole or slice or clove or handful”, “grams”: “amount in grams or ml”, “gramsUnit”: “g or kg or ml or L or pinch or to taste or whole or slice or clove or handful” }
],
“steps”: [“Step 1 text”, “Step 2 text”]
}
If you cannot find a specific field, use an empty string or empty array. Convert all ingredient amounts to both cups/tbsp/tsp AND grams/ml as accurately as possible.`;

```
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "anthropic-dangerous-direct-browser-access": "true" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 4000,
      tools: [{ type: "web_search_20250305", name: "web_search" }],
      messages: [{ role: "user", content: prompt }]
    })
  });
  if (!response.ok) { const e = await response.json().catch(() => ({})); throw new Error(e.error?.message || `Error ${response.status}`); }
  const data = await response.json();
  const text = data.content.filter(b => b.type === "text").map(b => b.text).join("");
  const clean = text.replace(/```json|```/g, "").trim();
  const start = clean.indexOf("{"); const end = clean.lastIndexOf("}");
  if (start === -1 || end === -1) throw new Error("No JSON found");
  return JSON.parse(clean.slice(start, end + 1));
}

function App() {

  const [toast, setToast] = useState(null);
  const [unitMode, setUnitMode] = useState("cups");
  const [importUrl, setImportUrl] = useState("");
  const [importing, setImporting] = useState(false);
  const [importError, setImportError] = useState("");

  useEffect(() => {
    try { const s = localStorage.getItem(STORAGE_KEY); setRecipes(s ? JSON.parse(s) : SAMPLE_RECIPES); }
    catch { setRecipes(SAMPLE_RECIPES); }
  }, []);
  useEffect(() => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(recipes)); } catch {} }, [recipes]);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2500); };

  const handleImport = async () => {
    if (!importUrl.trim()) return;
    setImporting(true); setImportError("");
    try {
      const data = await importRecipeFromUrl(importUrl.trim());
      setForm({ ...emptyForm(), ...data, sourceUrl: importUrl.trim(), ingredients: data.ingredients?.length ? data.ingredients : [emptyIng()], steps: data.steps?.length ? data.steps : [""], favorite: false });
      setImportUrl("");
      showToast("Recipe imported — review and save ✓");
    } catch { setImportError("Couldn't import that URL. Try another or fill in manually."); }
    setImporting(false);
  };

  const filtered = recipes.filter(r => {
    const q = search.toLowerCase();
    const ingText = (r.ingredients||[]).map(i => i.name).join(" ").toLowerCase();
    return (!q || r.title.toLowerCase().includes(q) || (r.tags||"").toLowerCase().includes(q) || ingText.includes(q))
      && (filterCat === "All" || r.category === filterCat)
      && (!filterFav || r.favorite);
  });

  const toggleFav = (id) => { setRecipes(rs => rs.map(r => r.id === id ? {...r, favorite: !r.favorite} : r)); if (selected?.id === id) setSelected(s => ({...s, favorite: !s.favorite})); };
  const deleteRecipe = (id) => { setRecipes(rs => rs.filter(r => r.id !== id)); setView("grid"); setSelected(null); showToast("Recipe deleted"); };
  const saveRecipe = () => {
    if (!form.title.trim()) { showToast("Please enter a recipe name"); return; }
    const cleaned = {...form, ingredients: form.ingredients.filter(i => i.name.trim()), steps: form.steps.filter(s => s.trim())};
    if (view === "edit") { const u = {...selected, ...cleaned}; setRecipes(rs => rs.map(r => r.id === selected.id ? u : r)); setSelected(u); setView("detail"); showToast("Recipe updated"); }
    else { setRecipes(rs => [{...cleaned, id: Date.now()}, ...rs]); setView("grid"); showToast("Recipe added"); }
  };
  const openAdd = () => { setForm(emptyForm()); setImportUrl(""); setImportError(""); setView("add"); };
  const openEdit = () => { setForm({...selected, ingredients: selected.ingredients?.length ? selected.ingredients : [emptyIng()], steps: selected.steps?.length ? selected.steps : [""]}); setImportError(""); setView("edit"); };
  const openDetail = (r) => { setSelected(r); setView("detail"); };

  const updateIng = (i, f, v) => setForm(fm => { const a = [...fm.ingredients]; a[i] = {...a[i], [f]: v}; return {...fm, ingredients: a}; });
  const addIng = () => setForm(f => ({...f, ingredients: [...f.ingredients, emptyIng()]}));
  const removeIng = (i) => setForm(f => ({...f, ingredients: f.ingredients.filter((_,j) => j !== i)}));
  const updateStep = (i, v) => setForm(f => { const s = [...f.steps]; s[i] = v; return {...f, steps: s}; });
  const addStep = () => setForm(f => ({...f, steps: [...f.steps, ""]}));
  const removeStep = (i) => setForm(f => ({...f, steps: f.steps.filter((_,j) => j !== i)}));

              <div style={{display:"flex", gap:6, flexWrap:"wrap", marginBottom:16}}>
                <span className="tag tag-accent" style={{fontSize:13}}>{selected.category}</span>
                {selected.time && <span className="tag" style={{fontSize:13}}>⏱ {selected.time}</span>}
                {selected.tags && selected.tags.split(",").filter(Boolean).map(t => <span key={t} className="tag" style={{fontSize:13}}>{t.trim()}</span>)}
              </div>
              {selected.sourceUrl && (
                <div style={{marginBottom:20}}>
                  <a href={selected.sourceUrl} target="_blank" rel="noopener noreferrer" className="source-link">
                    🔗 View on {hostname(selected.sourceUrl)}
                  </a>
                </div>
              )}

              <hr className="divider" />

              {/* Ingredients */}
              <div style={{marginBottom:24}}>
                <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14}}>
                  <h2 style={{fontFamily:"'DM Serif Display', serif", fontSize:20, color:"var(--text)"}}>Ingredients</h2>
                  <div className="unit-toggle">
                    <button className={unitMode==="cups"?"active":""} onClick={() => setUnitMode("cups")}>Cups</button>
                    <button className={unitMode==="grams"?"active":""} onClick={() => setUnitMode("grams")}>Grams</button>
                  </div>
                </div>
                <div style={{background:"var(--bg)", borderRadius:10, padding:"0 16px"}}>
                  {(selected.ingredients||[]).map((ing,i) => (
                    <div key={i} className="ing-list-item">
                      <div className="ing-dot"></div>
                      <div style={{flex:1, color:"var(--text)"}}>{ing.name}</div>
                      <div style={{color:"var(--accent)", fontWeight:600, fontSize:14, whiteSpace:"nowrap"}}>{ingDisplay(ing)}</div>
                    </div>
                  ))}
                </div>
              </div>

              <hr className="divider" style={{margin:"0 0 24px"}} />

              {/* Instructions */}
              <div style={{marginBottom:28}}>
                <h2 style={{fontFamily:"'DM Serif Display', serif", fontSize:20, color:"var(--text)", marginBottom:16}}>Instructions</h2>
                {(selected.steps||[]).map((step,i) => (
                  <div key={i} className="step-display">
                    <div className="step-num">{i+1}</div>
                    <div style={{fontSize:15, color:"var(--text)", lineHeight:1.7, paddingTop:3}}>{step}</div>
                  </div>
                ))}
              </div>

              <div style={{display:"flex", gap:8}}>
                <button className="btn btn-primary" onClick={openEdit}>Edit Recipe</button>
                <button className="btn btn-danger" onClick={() => deleteRecipe(selected.id)}>Delete</button>
              </div>
            </div>
          </div>
        )}

        {/* ADD / EDIT FORM */}
        {(view==="add"||view==="edit") && (
          <div style={{maxWidth:720, margin:"0 auto"}}>
            <button className="btn btn-ghost" onClick={() => setView(view==="edit"?"detail":"grid")} style={{marginBottom:20}}>← Back</button>
            <div style={{background:"var(--surface)", border:"1.5px solid var(--border)", borderRadius:"var(--radius-lg)", padding:"28px 24px", boxShadow:"var(--shadow)"}}>
              <h2 style={{fontFamily:"'DM Serif Display', serif", fontSize:26, marginBottom:24, color:"var(--text)"}}>{view==="edit"?"Edit Recipe":"New Recipe"}</h2>

              {/* Import */}
              {view==="add" && (
                <div className="import-box">
                  <div style={{fontWeight:600, fontSize:14, color:"var(--accent)", marginBottom:6}}>✦ Import from URL</div>
                  <div style={{fontSize:13, color:"var(--text-secondary)", marginBottom:12}}>Paste any recipe link and AI will fill in the form automatically.</div>
                  <div className="import-row">
                    <input className="input" placeholder="https://..." value={importUrl} onChange={e => {setImportUrl(e.target.value); setImportError("");}} onKeyDown={e => e.key==="Enter" && !importing && handleImport()} disabled={importing} />
                    <button className="btn btn-primary" onClick={handleImport} disabled={importing||!importUrl.trim()} style={{whiteSpace:"nowrap", minWidth:100}}>
                      {importing ? <><span className="spinner"></span> Importing</> : "Import"}
                    </button>
                  </div>
                  {importError && <div style={{fontSize:12, color:"var(--danger)", marginTop:8}}>⚠ {importError}</div>}
                </div>
              )}

              <div style={{marginBottom:16}}>
                <label className="form-label">Source URL</label>
                <input className="input" placeholder="https://..." value={form.sourceUrl||""} onChange={e => setForm(f => ({...f, sourceUrl: e.target.value}))} />
              </div>

              <div style={{marginBottom:16}}>
                <label className="form-label">Recipe Name *</label>
                <input className="input" placeholder="e.g. Sourdough Discard Pancakes" value={form.title} onChange={e => setForm(f => ({...f, title: e.target.value}))} />
              </div>

              <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:16}}>
                <div>
                  <label className="form-label">Category</label>
                  <select className="input" value={form.category} onChange={e => setForm(f => ({...f, category: e.target.value}))}>
                    {CATEGORIES.map(c => <option key={c}>{c}</option>)}
                  </select>
                </div>
                <div>
                  <label className="form-label">Cook Time</label>
                  <input className="input" placeholder="e.g. 45m or 1h 30m" value={form.time} onChange={e => setForm(f => ({...f, time: e.target.value}))} />
                </div>
              </div>

              <div style={{marginBottom:16}}>
                <label className="form-label">Emoji</label>
                <div style={{display:"flex", flexWrap:"wrap", gap:4}}>
                  {EMOJI_LIST.map(e => <button key={e} className={`emoji-btn ${form.emoji===e?"sel":""}`} onClick={() => setForm(f => ({...f, emoji: e}))}>{e}</button>)}
                </div>
              </div>

              <div style={{marginBottom:16}}>
                <label className="form-label">Tags</label>
                <input className="input" placeholder="e.g. easy, vegetarian, quick" value={form.tags} onChange={e => setForm(f => ({...f, tags: e.target.value}))} />
              </div>

              {/* Ingredients */}
              <div style={{marginBottom:20}}>
                <label className="form-label" style={{marginBottom:10}}>Ingredients</label>
                <div style={{display:"grid", gridTemplateColumns:"1fr 70px 78px 70px 70px 28px", gap:5, marginBottom:6}}>
                  {["Ingredient","Cups/Amt","Unit","Grams","Unit",""].map((l,i) => <div key={i} style={{fontSize:10, fontWeight:600, color:"var(--text-tertiary)", textTransform:"uppercase", letterSpacing:"0.05em"}}>{l}</div>)}
                </div>
                {form.ingredients.map((ing,i) => (
                  <div key={i} style={{display:"grid", gridTemplateColumns:"1fr 70px 78px 70px 70px 28px", gap:5, marginBottom:5}}>
                    <input className="input" style={{padding:"8px 10px", fontSize:14}} placeholder="Flour" value={ing.name} onChange={e => updateIng(i,"name",e.target.value)} />
                    <input className="input" style={{padding:"8px", fontSize:14}} placeholder="2" value={ing.cups} onChange={e => updateIng(i,"cups",e.target.value)} />
                    <select className="input" style={{padding:"8px 4px", fontSize:13}} value={ing.cupsUnit} onChange={e => updateIng(i,"cupsUnit",e.target.value)}>
                      {CUP_UNITS.map(u => <option key={u}>{u}</option>)}
                    </select>
                    <input className="input" style={{padding:"8px", fontSize:14}} placeholder="240" value={ing.grams} onChange={e => updateIng(i,"grams",e.target.value)} />
                    <select className="input" style={{padding:"8px 4px", fontSize:13}} value={ing.gramsUnit} onChange={e => updateIng(i,"gramsUnit",e.target.value)}>
                      {GRAM_UNITS.map(u => <option key={u}>{u}</option>)}
                    </select>
                    <button className="remove-btn" onClick={() => removeIng(i)}>×</button>
                  </div>
                ))}
                <button className="add-row-btn" onClick={addIng}>+ Add Ingredient</button>
              </div>

              {/* Steps */}
              <div style={{marginBottom:22}}>
                <label className="form-label" style={{marginBottom:10}}>Instructions</label>
                {form.steps.map((step,i) => (
                  <div key={i} className="step-row">
                    <div className="step-num-edit">{i+1}</div>
                    <textarea className="input" style={{fontSize:14, minHeight:60}} placeholder={`Step ${i+1}…`} value={step} onChange={e => updateStep(i,e.target.value)} />
                    <button className="remove-btn" onClick={() => removeStep(i)} style={{marginTop:11}}>×</button>
                  </div>
                ))}
                <button className="add-row-btn" onClick={addStep}>+ Add Step</button>
              </div>

              <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:24}}>
                <input type="checkbox" id="fav" checked={form.favorite} onChange={e => setForm(f => ({...f, favorite: e.target.checked}))} style={{width:16, height:16, accentColor:"var(--accent)", cursor:"pointer"}} />
                <label htmlFor="fav" style={{fontSize:14, fontWeight:500, cursor:"pointer", userSelect:"none"}}>Mark as favorite</label>
              </div>

              <div style={{display:"flex", gap:8}}>
                <button className="btn btn-primary" onClick={saveRecipe} style={{fontSize:15, padding:"11px 24px"}}>{view==="edit"?"Save Changes":"Add Recipe"}</button>
                <button className="btn btn-ghost" onClick={() => setView(view==="edit"?"detail":"grid")}>Cancel</button>
              </div>
            </div>
          </div>
        )}
      </main>

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
